name: Feature request
description: Propose a product, platform, integration, or documentation improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: outcome
    attributes:
      label: Desired outcome
      options:
        - Better first-run onboarding
        - Better project audit or improvement flow
        - New executor or LLM provider
        - Stronger policy or security
        - Better observability
        - Better UI or design system
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What could be done instead?
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How would we know this worked?
